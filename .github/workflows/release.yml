name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build & Release
    runs-on: macos-15

    steps:
      - name: Checkout axion
        uses: actions/checkout@v4

      - name: Select Xcode with Swift 6.2
        run: sudo xcode-select -s /Applications/Xcode_26.2.app/Contents/Developer

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Sync VERSION file
        run: echo "${{ steps.version.outputs.version }}" > VERSION

      - name: Cache Swift build
        uses: actions/cache@v4
        with:
          path: .build
          key: swift-release-${{ runner.os }}-${{ hashFiles('Package.resolved') }}
          restore-keys: swift-release-${{ runner.os }}-

      - name: Build release package
        id: build
        run: |
          bash Distribution/homebrew/build-release.sh "${{ steps.version.outputs.version }}"
          VERSION="${{ steps.version.outputs.version }}"
          SHA256=$(shasum -a 256 ".build/dist/axion-$VERSION.tar.gz" | cut -d' ' -f1)
          echo "sha256=$SHA256" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SHA256="${{ steps.build.outputs.sha256 }}"
          TAR_PATH=".build/dist/axion-$VERSION.tar.gz"

          gh release create "v$VERSION" "$TAR_PATH" \
            --title "Axion v$VERSION" \
            --generate-notes \
            --notes "SHA256: \`$SHA256\`

          ### Installation

          \`\`\`bash
          brew tap terryso/tap
          brew install axion
          \`\`\`"

      - name: Update homebrew-tap formula
        if: env.HOMEBREW_TAP_TOKEN != ''
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          CLONE_DIR=$(mktemp -d)
          trap 'rm -rf "$CLONE_DIR"' EXIT

          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/terryso/homebrew-tap.git" "$CLONE_DIR" 2>/dev/null

          mkdir -p "$CLONE_DIR/Formula"
          cp Distribution/homebrew/axion.rb "$CLONE_DIR/Formula/axion.rb"

          cd "$CLONE_DIR"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/axion.rb
          git diff --cached --quiet || git commit -m "axion $VERSION"
          git push origin main 2>/dev/null || git push origin master 2>/dev/null

          echo "Homebrew tap formula updated to $VERSION"
