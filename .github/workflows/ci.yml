name: CI

on:
  push:
  pull_request:
    branches: [main]

jobs:
  test-macos:
    name: Test (macOS)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          path: axion
      - name: Checkout open-agent-sdk-swift
        uses: actions/checkout@v4
        with:
          repository: terryso/open-agent-sdk-swift
          ref: main
          path: open-agent-sdk-swift
      - name: Select Xcode with Swift 6.2
        run: sudo xcode-select -s /Applications/Xcode_26.2.app/Contents/Developer
      - name: Cache Swift build
        uses: actions/cache@v4
        with:
          path: axion/.build
          key: swift-${{ runner.os }}-${{ hashFiles('axion/Package.resolved') }}
          restore-keys: swift-${{ runner.os }}-
      - name: Run unit tests with coverage
        working-directory: axion
        run: swift test --no-parallel --enable-code-coverage --skip AxionHelperIntegrationTests --skip AxionCLIIntegrationTests --skip AxionE2ETests
      - name: Extract coverage percentage
        working-directory: axion
        run: |
          XCTEST_PATH="$(find .build -name '*.xctest' -type d | head -1)"
          BINARY="${XCTEST_PATH}/Contents/MacOS/$(basename "$XCTEST_PATH" .xctest)"
          PROF_DATA=".build/debug/codecov/default.profdata"
          set -- $(xcrun llvm-cov report "$BINARY" \
            -instr-profile="$PROF_DATA" \
            -ignore-filename-regex='.build/|Tests/|open-agent-sdk|swift-mcp|swift-argument|swift-system|swift-syntax|swift-sse|ArgumentParser' \
            | tail -1)
          COVERAGE=$(printf "%.1f" $(echo "$4" | sed 's/%//'))
          echo "COVERAGE=$COVERAGE" >> $GITHUB_ENV
          echo "Coverage: ${COVERAGE}%"
      - name: Update coverage badge
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: Schneegans/dynamic-badges-action@v1.8.0
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: ${{ secrets.GIST_ID }}
          filename: coverage.json
          label: coverage
          message: ${{ env.COVERAGE }}%
          valColorRange: ${{ env.COVERAGE }}
          maxColorRange: 100
          minColorRange: 0
